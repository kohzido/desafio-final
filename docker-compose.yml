version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: desafio_postgres
    environment:
      POSTGRES_DB: desafio_final
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - desafio_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d desafio_final"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desafio_api
    ports:
      - "5131:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=desafio_final;Username=postgres;Password=postgres"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - desafio_net

volumes:
  postgres_data:

networks:
  desafio_net:
    driver: bridge
